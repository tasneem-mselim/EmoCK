
<!DOCTYPE html>
<html>
<head>

<title>Leaderboard</title>
<style>
body {
    font-family: Arial;
    background: #f7fbff;
    color: black;
    text-align: center;
    padding: 30px;
}

table {
    border-collapse: collapse;
    width: 70%;
    margin: auto;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
}

th {
    background: #eef5fb;
}

tr:nth-child(even) {
    background: #f4f7fa;
}

.gold { background-color: #FFD700; font-weight: bold; }
.silver { background-color: #C0C0C0; font-weight: bold; }
.bronze { background-color: #CD7F32; font-weight: bold; }

.stats {
    margin-top: 40px;
}
</style>
</head>

<body>

        <td>ahmedbenbellaa</td>
        <td>90.16</td>
        <td>88.2300</td>

    <tr class="silver">
        <td>🥈 2</td>

</html>
